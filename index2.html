<!DOCTYPE html>
<html>
<head>
    <title>Image Hyperlink and Nested Table</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
        }

        table{
            border-collapse: collapse;
            margin: 20px auto;
            width: 70%;
            background-color: white;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
        }

        th{
            background-color: #2c7be5;
            color: white;
        }

        img{
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h1>Student Academic Details</h1>

<h2>Image Hyperlink</h2>

<a href="https://www.wikipedia.org" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Wikipedia-logo.png/200px-Wikipedia-logo.png" 
    width="150" height="150" alt="Wikipedia">
</a>

<p>Click the image to visit Wikipedia</p>

<h2>Student Information Table</h2>

<!-- Main Table -->
<table>
<tr>
    <th>Student Name</th>
    <th>Semester</th>
    <th>Status</th>
    <th>Subjects</th>
</tr>

<tr>
    <td>Durgeshwari</td>
    <td>Semester 4</td>
    <td>Active</td>

    <td>
        <!-- Nested Table -->
        <table>
            <tr>
                <th>Subject</th>
                <th>Marks</th>
            </tr>

            <tr>
                <td>HTML</td>
                <td>90</td>
            </tr>

            <tr>
                <td>CSS</td>
                <td>85</td>
            </tr>

            <tr>
                <td>JavaScript</td>
                <td>88</td>
            </tr>

        </table>
    </td>

</tr>

</table>

</body>
</html>
